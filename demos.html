<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Vault — Interactive Demos</title>
<meta name="description" content="Try before you buy — interactive demos for Game Vault products">
<style>

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a12;
  color:#eaeaff;
  font-family:'Space Grotesk','Inter',system-ui,sans-serif;
  min-height:100vh;
}
.container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:2.2rem;margin-bottom:.5rem}
.subtitle{color:#8888aa;font-size:1rem;margin-bottom:2rem}
.demo-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
  gap:1.5rem;
}
.demo-card{
  background:#12122a;
  border:1px solid #1a1a3a;
  border-radius:12px;
  overflow:hidden;
  transition:transform .2s,border-color .2s;
}
.demo-card:hover{
  transform:translateY(-2px);
  border-color:var(--accent);
}
.demo-card .frame-wrap{
  position:relative;
  width:100%;
  height:260px;
  overflow:hidden;
  background:#000;
}
.demo-card iframe{
  width:100%;
  height:100%;
  border:none;
  transform-origin:0 0;
}
.demo-card .card-body{padding:1rem 1.25rem}
.demo-card .product-name{
  font-size:1.1rem;
  font-weight:700;
  color:#eaeaff;
  margin-bottom:.35rem;
}
.demo-card .product-desc{
  font-size:.85rem;
  color:#8888aa;
  line-height:1.4;
  margin-bottom:.75rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.demo-card .card-footer{
  display:flex;align-items:center;justify-content:space-between;
}
.demo-card .price{
  font-weight:700;
  color:var(--accent);
  font-size:1.1rem;
}
.demo-card .btn-buy{
  display:inline-block;
  padding:.5rem 1.25rem;
  background:var(--accent);
  color:#000;
  font-weight:700;
  font-size:.85rem;
  border-radius:6px;
  text-decoration:none;
  transition:opacity .2s;
}
.demo-card .btn-buy:hover{opacity:.85}
.demo-card .btn-expand{
  display:block;
  text-align:center;
  padding:.5rem;
  font-size:.8rem;
  color:#8888aa;
  text-decoration:none;
  border-top:1px solid #1a1a3a;
  transition:color .2s;
}
.demo-card .btn-expand:hover{color:var(--accent)}
.back-link{
  display:inline-block;
  color:#8888aa;
  text-decoration:none;
  margin-bottom:1.5rem;
  font-size:.9rem;
}
.back-link:hover{color:#eaeaff}
.store-section{margin-bottom:3rem}
.store-section h2{
  font-size:1.5rem;
  margin-bottom:1rem;
  padding-bottom:.5rem;
  border-bottom:1px solid #1a1a3a;
}
.badge{
  display:inline-block;
  padding:.2rem .6rem;
  border-radius:4px;
  font-size:.75rem;
  font-weight:600;
  margin-left:.5rem;
  vertical-align:middle;
}

</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="https://inity13.github.io/neon-game-vault">← Back to Game Vault</a>
  <h1 style="color:#39FF14">Game Vault Demos</h1>
  <p class="subtitle">Try before you buy — 1 interactive previews</p>
  <div class="demo-grid">
    <div class="demo-card" style="--accent:#39FF14">
  <div class="frame-wrap">
    <iframe src="demos/gaming-keybind-planner/index.html" loading="lazy" sandbox="allow-scripts" title="Gaming Keybind Planner demo"></iframe>
  </div>
  <div class="card-body">
    <div class="product-name">Gaming Keybind Planner</div>
    <div class="product-desc">Visual keybind layout planner — map your controls, export configs, and find the optimal setup for your playstyle.</div>
    <div class="card-footer">
      <span class="price">$1.00</span>
      <a class="btn-buy" href="https://buy.stripe.com/14AeVddL90qqbFw8ylgjG22" target="_blank" rel="noopener">Buy Now</a>
    </div>
  </div>
  <a class="btn-expand" href="demos/gaming-keybind-planner/index.html" target="_blank" rel="noopener">Open full demo ↗</a>
</div>
  </div>
</div>
</body>
</html>
